name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version (e.g. 1.0.0)'
        required: true
        type: string

env:
  REGISTRY: harbor.10.0.0.200.nip.io
  IMAGE_REPO: library/open-webui

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semver format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be semver format (e.g. 1.0.0)"
            exit 1
          fi
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      - name: Trust minicloud CA
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY }}
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates

      - name: Install crane
        run: |
          curl -sSL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: admin
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Re-tag SHA image with version
        run: |
          SHA=$(git rev-parse --short HEAD)
          crane tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${SHA}-amd64 \
            v${{ inputs.version }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign versioned image
        run: |
          DIGEST=$(crane digest ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:v${{ inputs.version }})
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}@${DIGEST}

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create and push signed version tag
        run: |
          git tag -s "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --verify-tag \
            --notes-start-tag "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
